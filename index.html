<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สอยดาวรับโชค - สงกรานต์</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 0;
            background-color: #fff;
            /* ใส่รูปพื้นหลังของคุณ */
            background-image: url('https://zjpreaw-dbs.github.io/Songkarn-DBS-Game/image.png'); 
            background-size: cover;
            background-position: center top;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ส่วนหัวข้อความที่ขยับขึ้นบน */
        #content-wrapper {
            width: 90%;
            max-width: 400px;
            margin-top: 50px; /* ระยะห่างจากขอบบนสุด ปรับเพิ่ม/ลดได้ตรงนี้ */
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9); /* พื้นหลังขาวโปร่งแสง */
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            z-index: 10;
        }

        h2 { color: #004d99; margin-bottom: 5px; font-size: 22px; }
        p { color: #555; margin: 5px 0; font-size: 16px; }

        .reward-box { 
            font-size: 28px; 
            color: #e63946; 
            font-weight: bold; 
            border: 3px dashed #ffb3b3; 
            padding: 15px; 
            margin: 15px 0; 
            border-radius: 15px; 
            background: #fff; 
        }

        button { 
            background-color: #28a745; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 25px; 
            width: 100%; 
            font-size: 18px; 
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        .notice { font-size: 13px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="content-wrapper">
        <h2 id="user-name">สวัสดีค่ะ</h2>
        
        <div id="result" style="display:none;">
            <p id="status-text">ยินดีด้วย! คุณสอยดาวได้รางวัล:</p>
            <div class="reward-box" id="reward-text"></div>
            <p class="notice">📸 แคปหน้าจอนี้แจ้งรับสิทธิ์ได้เลยค่ะ</p>
        </div>

        <button onclick="liff.closeWindow()">ปิดหน้าต่าง</button>
    </div>

    <script>
        const myLiffId = '2009679023-d6EBAyR8'; 
        
        const luckyBag = [ 
            ...Array(10).fill("ส่วนลด 1,000 บาท"),
            ...Array(10).fill("ส่วนลด 3,000 บาท"),
            ...Array(5).fill("ส่วนลด 4,000 บาท")
        ];

        async function initGame() {
            await liff.init({ liffId: myLiffId });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                document.getElementById('user-name').innerText = "สวัสดีคุณ " + profile.displayName;
                
                const savedReward = localStorage.getItem('my_reward_' + profile.userId);
                
                if (savedReward) {
                    document.getElementById('status-text').innerText = "รางวัลเดิมที่คุณได้รับคือ:";
                    document.getElementById('reward-text').innerText = savedReward;
                    document.getElementById('result').style.display = 'block';
                } else {
                    const win = luckyBag[Math.floor(Math.random() * luckyBag.length)];
                    localStorage.setItem('my_reward_' + profile.userId, win);
                    document.getElementById('reward-text').innerText = win;
                    document.getElementById('result').style.display = 'block';
                }
            }
        }
        initGame();
    </script>
</body>
</html>
